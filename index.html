<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PLE Workspace - Katherine Lamagna</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f1f5f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        .grid { display: none; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; }
        .grid.active { display: grid; }
        .card { border: 2px solid #ddd; padding: 10px; cursor: pointer; border-radius: 5px; }
        .card.selected { border-color: green; background: #e8f5e9; }
        .tab-btn { padding: 10px; cursor: pointer; background: #ddd; border: none; }
        .tab-btn.active { background: #1e3a8a; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>PLE Workspace</h1>
        <input type="text" id="nombre" placeholder="Tu nombre">
        
        <nav>
            <button class="tab-btn active" onclick="verTab(this, 'leer')">Leer</button>
            <button class="tab-btn" onclick="verTab(this, 'hacer')">Hacer</button>
        </nav>

        <div id="leer" class="grid active"></div>
        <div id="hacer" class="grid"></div>

        <h3>Reflexión</h3>
        <textarea id="ref" oninput="contar()" style="width:100%; height:80px;"></textarea>
        <p>Palabras: <span id="cuenta">0</span>/150</p>

        <button onclick="compilar()">COMPILAR PDF</button>
        <div id="resultado" style="margin-top:20px; border:1px solid #000; padding:10px; display:none;"></div>
    </div>

    <script>
        function verTab(btn, id) {
            document.querySelectorAll('.grid').forEach(g => g.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        function contar() {
            let txt = document.getElementById('ref').value;
            let n = txt.split(/\s+/).filter(w => w.length > 0).length;
            document.getElementById('cuenta').innerText = n;
        }

        function compilar() {
            let res = document.getElementById('resultado');
            res.innerHTML = "<h3>Documento Final</h3><p>Nombre: " + document.getElementById('nombre').value + "</p><p>Reflexión: " + document.getElementById('ref').value + "</p>";
            res.style.display = 'block';
        }

        // Cargar tarjetas
        ['leer', 'hacer'].forEach(cat => {
            ['Herramienta A', 'Herramienta B'].forEach(t => {
                let div = document.createElement('div');
                div.className = 'card';
                div.innerText = t;
                div.onclick = function() { this.classList.toggle('selected'); };
                document.getElementById(cat).appendChild(div);
            });
        });
    </script>
</body>
</html>
