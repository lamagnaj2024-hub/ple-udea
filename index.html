<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLE Workspace - Katherine Lamagna</title>
    <style>
        :root { --bg-main: #f1f5f9; --primary: #1e3a8a; --success: #10b981; --border: #cbd5e1; }
        body { font-family: sans-serif; background-color: var(--bg-main); padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 25px; border-radius: 16px; }
        .grid { display: none; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-top: 15px; }
        .grid.active { display: grid; }
        .card { border: 2px solid var(--border); padding: 15px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .card.selected { background: #f0fdf4; border-color: var(--success); }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: none; border-radius: 6px; background: #e2e8f0; }
        .tab-btn.active { background: var(--primary); color: white; }
        .editor { width: 100%; height: 120px; margin-top: 10px; }
        .btn-trigger { background: var(--success); color: white; padding: 15px; width: 100%; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>PLE Workspace</h1>
        <input type="text" id="in-student" placeholder="Tu nombre" style="width:100%; padding:10px;">
        
        <nav style="margin-top:20px;">
            <button class="tab-btn active" onclick="switchTab(this, 'leer')">Leer</button>
            <button class="tab-btn" onclick="switchTab(this, 'hacer')">Hacer</button>
            <button class="tab-btn" onclick="switchTab(this, 'compartir')">Compartir</button>
        </nav>

        <div id="pane-leer" class="grid active"></div>
        <div id="pane-hacer" class="grid"></div>
        <div id="pane-compartir" class="grid"></div>

        <h3>Reflexión</h3>
        <textarea id="txt-user-ref" class="editor" oninput="countWords()"></textarea>
        <p>Palabras: <span id="word-lbl">0</span>/150</p>

        <button class="btn-trigger" onclick="compileAndRenderPDF()">Compilar y Generar PDF</button>

        <div id="render-target" style="margin-top:20px; border:1px solid #ccc; padding:20px; display:none;"></div>
    </div>

    <script>
        const database = {
            leer: [{n: "Google Scholar"}, {n: "Scopus"}, {n: "Dialnet"}],
            hacer: [{n: "Canva"}, {n: "Genially"}, {n: "Mendeley"}],
            compartir: [{n: "LinkedIn"}, {n: "WhatsApp"}]
        };

        function switchTab(btn, cat) {
            document.querySelectorAll('.grid').forEach(g => g.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('pane-' + cat).classList.add('active');
            btn.classList.add('active');
        }

        function countWords() {
            const txt = document.getElementById('txt-user-ref').value;
            const count = txt.split(/\s+/).filter(w => w.length > 0).length;
            document.getElementById('word-lbl').innerText = count;
        }

        function compileAndRenderPDF() {
            const name = document.getElementById('in-student').value;
            const ref = document.getElementById('txt-user-ref').value;
            const target = document.getElementById('render-target');
            target.innerHTML = `<h2>Reporte Final</h2><p>Estudiante: ${name}</p><p>Reflexión: ${ref}</p>`;
            target.style.display = 'block';
        }

        // Inicializar tarjetas
        Object.keys(database).forEach(cat => {
            database[cat].forEach(tool => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = tool.n;
                div.onclick = function() { this.classList.toggle('selected'); };
                document.getElementById('pane-' + cat).appendChild(div);
            });
        });
    </script>
</body>
</html>
